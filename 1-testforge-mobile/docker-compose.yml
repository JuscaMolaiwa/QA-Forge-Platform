version: "3.9"

services:

  # ── Appium ──────────────────────────────────────────────────────────────────
  # Connects to your the local emulator running via host.docker.internal.
  # Before starting: run the emulator locally first (e.g. emulator -avd Pixel_API_33)
  appium:
    platform: linux/amd64
    image: appium/appium:latest
    ports:
      - "4723:4723"
    environment:
      - ANDROID_ADB_SERVER_ADDRESS=host.docker.internal
      - ANDROID_ADB_SERVER_PORT=5037
    extra_hosts:
      - "host.docker.internal:host-gateway" # ← fixes the DNS resolution
    entrypoint: [ "sh", "-c" ]
    command: >
      "adb connect host.docker.internal:5555 || true &&
       sleep 8 &&
      adb -s emulator-5554 forward tcp:8200 tcp:8200 && adb forward --list && appium --relaxed-security --address 0.0.0.0 --port 4723 --log-level info"
    restart: unless-stopped

  # ── ngrok (exposes Appium publicly) ─────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    ports:
      - "4040:4040" # ngrok inspector UI → http://localhost:4040
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http appium:4723 --log stdout
    depends_on:
      - appium
    restart: unless-stopped

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - SECRET_KEY=${SECRET_KEY:-dev-secret}
      - APPIUM_HOST=appium
      - APPIUM_BASE_PORT=4723
      - DATABASE_URL=${DATABASE_URL:-sqlite:///device_farm.db}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - ADB_HOST=host.docker.internal
      - ADB_PORT=5555
    volumes:
      - ./backend:/app
      - ./tests:/app/tests
    depends_on:
      - appium
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_WS_URL=ws://localhost:5000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    restart: unless-stopped
