services:

  # ── Backend (Flask + SocketIO) ───────────────────────────────────────────────
  - type: web
    name: appium-device-farm-backend
    runtime: python
    rootDir: 1-testforge-mobile/backend
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn.conf.py "app:app"
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////tmp/device_farm.db
      - key: FRONTEND_URL
        value: https://appium-device-farm-frontend.onrender.com
      - key: RENDER_EXTERNAL_URL
        value: https://appium-device-farm-backend.onrender.com
      - key: MAX_QUEUE_SIZE
        value: "50"
      - key: SESSION_TIMEOUT_SECONDS
        value: "300"

  # ── Frontend (React static site) ─────────────────────────────────────────────
  - type: web
    name: appium-device-farm-frontend
    runtime: static
    buildCommand: cd 1-testforge-mobile/frontend && npm install && npm run build
    staticPublishPath: 1-testforge-mobile/frontend/build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://appium-device-farm-backend.onrender.com
      - key: REACT_APP_WS_URL
        value: https://appium-device-farm-backend.onrender.com